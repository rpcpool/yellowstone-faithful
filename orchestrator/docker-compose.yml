version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: old-reliable-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: old_reliable
      POSTGRES_PASSWORD: old_reliable_pass
      POSTGRES_DB: old_reliable
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U old_reliable"]
      interval: 10s
      timeout: 5s
      retries: 5

  faktory:
    image: contribsys/faktory:latest
    container_name: old-reliable-faktory
    restart: unless-stopped
    ports:
      - "7419:7419"
      - "7420:7420"
    volumes:
      - faktory_data:/var/lib/faktory
    environment:
      FAKTORY_PASSWORD: ""

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: old-reliable-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://old_reliable:old_reliable_pass@postgres:5432/old_reliable?schema=public
      FAKTORY_URL: tcp://faktory:7419
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      faktory:
        condition: service_started
    volumes:
      - ./.env:/app/.env:ro

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: old-reliable-worker
    restart: unless-stopped
    command: ["pnpm", "tsx", "src/lib/worker.ts"]
    environment:
      DATABASE_URL: postgresql://old_reliable:old_reliable_pass@postgres:5432/old_reliable?schema=public
      FAKTORY_URL: tcp://faktory:7419
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      faktory:
        condition: service_started
    volumes:
      - ./.env:/app/.env:ro

volumes:
  postgres_data:
  faktory_data: